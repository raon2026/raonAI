<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>RAON AI - 관리자 로그인</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../shared/theme.css">

<style>

*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
font-family:system-ui,-apple-system,sans-serif;
color:white;
}

.card{
width:100%;
max-width:420px;
background:#111827;
border:1px solid #1f2937;
border-radius:16px;
padding:28px;
box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.title{
font-size:20px;
font-weight:700;
margin-bottom:18px;
text-align:center;
}

label{
font-size:13px;
color:#9ca3af;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:10px 12px;
border-radius:10px;
border:1px solid #1f2937;
background:#0b1220;
color:white;
margin-bottom:14px;
}

button{
width:100%;
padding:11px;
border-radius:999px;
border:none;
background:linear-gradient(135deg,#60a5fa,#22c55e);
font-weight:700;
cursor:pointer;
color:black;
}

button:hover{
opacity:.9;
}

.error{
margin-top:10px;
font-size:13px;
color:#ef4444;
text-align:center;
min-height:18px;
}

</style>
</head>


<body>

<div class="card">

<div class="title">관리자 로그인</div>

<label>아이디</label>
<input id="adminId" type="text">

<label>비밀번호</label>
<input id="adminPw" type="password">

<button id="btnLogin">로그인</button>

<div class="error" id="errorBox"></div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../shared/config.js"></script>
<script src="../shared/sb.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const idInput=document.getElementById("adminId")
const pwInput=document.getElementById("adminPw")
const btn=document.getElementById("btnLogin")
const errorBox=document.getElementById("errorBox")

const sb=(window.raon && typeof window.raon.sb==="function")
?window.raon.sb()
:null

if(!sb){

errorBox.textContent="Supabase 초기화 실패"
console.error("Supabase init error")
return

}

async function adminLogin(){

const username=idInput.value.trim()
const password=pwInput.value.trim()

if(!username || !password){

errorBox.textContent="아이디 / 비밀번호 입력"
return

}

const {data,error}=await sb
.from("app_users")
.select("*")
.eq("username",username)
.eq("password_hash",password)
.eq("role","admin")
.maybeSingle()

if(error || !data){

errorBox.textContent="로그인 실패"
console.error(error)
return

}

localStorage.setItem("raon_admin_login","true")
localStorage.setItem("raon_admin",JSON.stringify(data))

window.location.href="admin_dashboard.html"

}

btn.addEventListener("click",adminLogin)

pwInput.addEventListener("keydown",e=>{
if(e.key==="Enter") adminLogin()
})

})

</script>

</body>
</html>
